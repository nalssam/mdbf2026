name: Fetch game assets

on:
  workflow_dispatch:
  push:
    paths:
      - 'assets/sources.json'
      - 'assets/story.srt'
      - '.github/workflows/fetch-assets.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg and Korean fonts
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg fonts-noto-cjk

      - name: Download and convert assets listed in assets/sources.json
        run: |
          set -euo pipefail
          mkdir -p assets/img assets/audio assets/video
          tmp=$(mktemp -d)

          fetch_group() {
            local group="$1" outdir="$2"
            jq -e "has(\"${group}\")" assets/sources.json >/dev/null || return 0
            for name in $(jq -r ".${group} | keys[]" assets/sources.json); do
              if [ -f "$outdir/$name" ]; then
                echo "skip existing $group/$name"
                continue
              fi
              url=$(jq -r ".${group}[\"${name}\"]" assets/sources.json)
              src="$tmp/$name.src"
              echo "downloading $group/$name"
              curl -sSfL --retry 3 -o "$src" "$url"
              case "$name" in
                *.jpg)
                  ffmpeg -y -loglevel error -i "$src" -vf "scale=1280:-2" -q:v 4 "$outdir/$name"
                  ;;
                *.mp3)
                  if [[ "$url" == *.mp3 ]]; then
                    cp "$src" "$outdir/$name"
                  else
                    ffmpeg -y -loglevel error -i "$src" -codec:a libmp3lame -q:a 4 "$outdir/$name"
                  fi
                  ;;
                *)
                  cp "$src" "$outdir/$name"
                  ;;
              esac
            done
          }

          fetch_group images assets/img
          fetch_group audio assets/audio
          fetch_group video assets/video

      - name: Build story video (clips + narration + Korean subtitles)
        run: |
          set -euo pipefail
          jq -e 'has("video_build")' assets/sources.json >/dev/null || { echo "no video_build"; exit 0; }
          tmp=$(mktemp -d)
          n=$(jq '.video_build.clips | length' assets/sources.json)
          for i in $(seq 0 $((n-1))); do
            clip=$(jq -r ".video_build.clips[$i]" assets/sources.json)
            if [[ "$clip" == http* ]]; then
              curl -sSfL --retry 3 -o "$tmp/clip$i.mp4" "$clip"
            else
              cp "$clip" "$tmp/clip$i.mp4"   # local repo clip (e.g. hand-built scene)
            fi
            curl -sSfL --retry 3 -o "$tmp/voice$i.mp3" "$(jq -r ".video_build.voices[$i]" assets/sources.json)"
          done
          : > "$tmp/list.txt"
          for i in $(seq 0 $((n-1))); do
            cd_dur=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$tmp/clip$i.mp4")
            vd=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$tmp/voice$i.mp3")
            pad=$(python3 -c "print(max(0.0, 10 - float('$cd_dur')))")
            tempo=$(python3 -c "d=float('$vd'); print(round(d/9.8,4) if d>9.8 else 1)")
            delay=$(python3 -c "d=min(float('$vd'),9.8); print(int(max(0.0,(10-d)/2)*1000))")
            echo "block $i: clip=${cd_dur}s pad=${pad}s voice=${vd}s tempo=${tempo} delay=${delay}ms"
            ffmpeg -y -loglevel error -i "$tmp/clip$i.mp4" -i "$tmp/voice$i.mp3" -filter_complex \
              "[0:v]tpad=stop_mode=clone:stop_duration=${pad},scale=1280:720,fps=30,format=yuv420p[v];[0:a]volume=0.35,apad[a0];[1:a]atempo=${tempo},adelay=${delay}:all=1,apad[a1];[a0][a1]amix=inputs=2:duration=longest:normalize=0[a]" \
              -map "[v]" -map "[a]" -t 10 -c:v libx264 -crf 20 -preset medium -c:a aac -b:a 160k "$tmp/block$i.mp4"
            echo "file '$tmp/block$i.mp4'" >> "$tmp/list.txt"
          done
          ffmpeg -y -loglevel error -f concat -safe 0 -i "$tmp/list.txt" -c copy "$tmp/joined.mp4"
          ffmpeg -y -loglevel error -i "$tmp/joined.mp4" \
            -vf "subtitles=assets/story.srt:force_style='FontName=Noto Sans CJK KR,FontSize=15,PrimaryColour=&H00FFFFFF,OutlineColour=&H00000000,BorderStyle=1,Outline=2,Shadow=0,MarginV=26'" \
            -c:v libx264 -crf 20 -preset medium -c:a copy assets/video/story.mp4
          ffprobe -v error -show_entries format=duration -of csv=p=0 assets/video/story.mp4

      - name: Fetch YouTube titles
        run: |
          set -euo pipefail
          jq -e 'has("youtube")' assets/sources.json >/dev/null || { echo "no youtube list"; exit 0; }
          echo "[]" > /tmp/videos.json
          for id in $(jq -r '.youtube[]' assets/sources.json); do
            meta=$(curl -sSfL "https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json" || echo '{}')
            title=$(echo "$meta" | jq -r '.title // empty')
            author=$(echo "$meta" | jq -r '.author_name // empty')
            jq --arg id "$id" --arg t "${title:-6·25 학습 영상}" --arg a "${author:-}" \
              '. += [{id:$id, title:$t, author:$a}]' /tmp/videos.json > /tmp/videos2.json && mv /tmp/videos2.json /tmp/videos.json
          done
          cp /tmp/videos.json assets/videos.json
          cat assets/videos.json

      - name: Commit assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A assets/
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "Add generated game assets (images, audio, video)"
          git push
